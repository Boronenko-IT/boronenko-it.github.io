<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Илья Бороненко — IT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #2563eb;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 22px;
    }

    p {
      color: #94a3b8;
      margin: 5px 0;
      font-size: 14px;
    }

    .links a {
      display: block;
      margin-top: 10px;
      padding: 8px;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      color: #3b82f6;
      text-decoration: none;
      transition: 0.2s;
    }

    .links a:hover {
      background: #3b82f6;
      color: #0f172a;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="avatar">IB</div>
    <h1>Илья Бороненко</h1>
    <p>Системный администратор / Network Engineer</p>
    <p>Linux • Networking • DevOps</p>

    <div class="links">
      <a href="https://github.com/">GitHub</a>
      <a href="#">Telegram</a>
      <a href="#">Email</a>
    </div>
  </div>
</body>
</html>
