<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моя визитка</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #334155;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: #38bdf8;
    }

    h1 {
      font-size: 20px;
      margin: 10px 0 5px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin: 5px 0;
    }

    .links {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    a {
      text-decoration: none;
      color: #38bdf8;
      border: 1px solid #38bdf8;
      padding: 8px;
      border-radius: 8px;
      transition: 0.2s;
    }

    a:hover {
      background: #38bdf8;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">IT</div>
    <h1>Илья Бороненко</h1>
    <p>Системный администратор / Network Engineer</p>
    <p>Linux • Networking • DevOps</p>

    <div class="links">
      <a href="https://github.com/" target="_blank">GitHub</a>
      <a href="#">Telegram</a>
      <a href="#">Email</a>
    </div>
  </div>
</body>
</html>
